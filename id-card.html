<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Aries Aero Employee ID Card</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Arimo:wght@400;600;700&display=swap');

  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Arimo',sans-serif;background:#1a1a2e;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:2rem}
  
  .id-card{
    width:354px;height:563px;background:#f5f5f5;border-radius:8px;
    box-shadow:0 12px 40px rgba(0,0,0,.3);position:relative;overflow:hidden
  }

  .bg-overlay{
    position:absolute;top:0;left:0;width:100%;height:100%;
    background:linear-gradient(135deg,#d4d4d4 0%,#e8e8e8 30%,#f5f5f5 60%,#ffffff 100%);
    z-index:1
  }

  .bg-shape{
    position:absolute;top:-50px;right:-80px;width:300px;height:400px;
    background:linear-gradient(145deg,#c0c0c0,#a0a0a0);
    transform:rotate(15deg);border-radius:20px;z-index:2
  }

  .bg-shape2{
    position:absolute;bottom:-30px;left:-60px;width:200px;height:250px;
    background:linear-gradient(145deg,#b8b8b8,#909090);
    transform:rotate(-10deg);border-radius:15px;z-index:2
  }

  .content{position:relative;z-index:10;width:100%;height:100%;padding:0}

  .company-logo{
    position:absolute;top:20px;left:20px;z-index:20
  }
  .company-logo img{height:25px;filter:brightness(0)}
  .company-logo .logo-text{
    font-size:11px;font-weight:700;color:#1a1a1a;letter-spacing:1px;text-transform:uppercase
  }
  .company-logo .logo-sub{
    font-size:7px;color:#666;letter-spacing:2px;text-transform:uppercase
  }

  .designation-area{
    position:absolute;top:90px;left:20px;z-index:20;text-align:left
  }
  .designation{
    font-size:16px;font-weight:700;color:#1a1a1a;line-height:1.2;
    text-transform:uppercase;letter-spacing:0.5px
  }

  .employee-id{
    position:absolute;top:160px;left:20px;z-index:20;
    font-size:8px;color:#666;letter-spacing:1.5px
  }

  .name-vertical{
    position:absolute;left:50px;top:50%;transform:translateY(-50%) rotate(90deg);
    transform-origin:center center;z-index:20;
    font-size:42px;font-weight:700;color:#1a1a1a;
    letter-spacing:3px;text-transform:uppercase;white-space:nowrap;
    line-height:1
  }

  .photo-area{
    position:absolute;bottom:0;right:0;width:280px;height:420px;z-index:15;
    overflow:hidden
  }
  .photo-area img{
    width:100%;height:100%;object-fit:cover;object-position:top center
  }
  .photo-placeholder{
    width:100%;height:100%;background:linear-gradient(180deg,#e0e0e0,#c8c8c8);
    display:flex;align-items:center;justify-content:center;
    color:#999;font-size:12px;text-align:center
  }

  .info-strip{
    position:absolute;bottom:0;left:0;right:0;height:70px;z-index:25;
    background:rgba(26,26,26,.85);backdrop-filter:blur(5px);
    display:flex;align-items:center;justify-content:space-between;padding:0 15px
  }

  .info-item{color:#fff}
  .info-label{font-size:7px;color:#aaa;text-transform:uppercase;letter-spacing:1px;margin-bottom:2px}
  .info-value{font-size:11px;font-weight:600}
  .info-value.blood{color:#ff6b6b;font-weight:700}

  .corner-accent{
    position:absolute;bottom:70px;right:0;width:60px;height:3px;
    background:linear-gradient(270deg,#0055a5,#0088ff);z-index:25
  }

  @media print{
    body{background:none;padding:0}
    .id-card{box-shadow:none;border:1px solid #ddd}
  }
</style>
</head>
<body>
<div class="id-card">
  <div class="bg-overlay"></div>
  <div class="bg-shape"></div>
  <div class="bg-shape2"></div>

  <div class="company-logo">
    <img src="https://aries.aero/aries-logo.png" alt="Aries Aero">
    <div class="logo-text">Aries Aero</div>
    <div class="logo-sub">DGCA Authorized RPTO</div>
  </div>

  <div class="designation-area">
    <div class="designation">HEAD OF<br>TRAINING</div>
  </div>

  <div class="employee-id">EMPLOYEE ID: AL-2024-0042</div>

  <div class="name-vertical">RAHUL SHARMA</div>

  <div class="photo-area">
    <!-- Replace with actual photo: <img src="employee-photo.jpg" alt="Employee Photo"> -->
    <div class="photo-placeholder">EMPLOYEE<br>PHOTO<br>35×45mm</div>
  </div>

  <div class="info-strip">
    <div class="info-item">
      <div class="info-label">Blood Group</div>
      <div class="info-value blood">O+</div>
    </div>
    <div class="info-item">
      <div class="info-label">Emergency Contact</div>
      <div class="info-value">+91 86103 24242</div>
    </div>
    <div class="info-item">
      <div class="info-label">Email</div>
      <div class="info-value">info@aerobotlabs.com</div>
    </div>
  </div>

  <div class="corner-accent"></div>
</div>
</body>
</html>
